language: en-US

reviews:
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  collapse_walkthrough: true
  sequence_diagrams: false

  path_instructions:
    - path: "apps/web/client/src/server/**/*.ts"
      instructions: |
        This is server-only tRPC code. Verify:
        - protectedProcedure is used for authenticated routes
        - Ownership checks are enforced server-side, not just UI-gated
        - onConflictDoUpdate.set does not mutate immutable identity fields

    - path: "apps/web/client/src/proxy.ts"
      instructions: |
        This is the Next.js 16 request proxy (not middleware.ts).
        It handles session refresh and auth redirects.
        Changes here affect every request — review carefully.

    - path: "apps/web/client/src/app/auth/**/*.ts"
      instructions: |
        Auth callback and error handling. Next.js redirects throw special errors.
        Ensure redirect errors are filtered via isRedirectError(), not logged as failures.

    - path: "packages/db/src/schema/**/*.ts"
      instructions: |
        Drizzle ORM schema definitions. Changes here affect migrations.
        Verify new columns have sensible defaults and nullability.

    - path: "packages/code-provider/src/**/*.ts"
      instructions: |
        Sandbox provider abstraction. All method parameters must be JSON-serializable
        primitives (no classes, callbacks, or non-serializable types) for LLM integration.

  path_filters:
    - "!**/*.lock"
    - "!bun.lock"
    - "!.next/**"
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/coverage/**"
    - "!**/playwright-report/**"
    - "!**/test-results/**"
    - "!apps/backend/supabase/migrations/**"

  tools:
    shellcheck:
      enabled: true

chat:
  auto_reply: true
