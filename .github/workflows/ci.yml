name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  format:
    name: Format check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun-workspace
      - run: bun run --filter '*' format

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun-workspace
      - run: bun run --filter '*' lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun-workspace
      - run: bun run --filter '*' typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun-workspace
      - run: bun run --filter '*' test

  playwright:
    name: Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun-workspace
      - run: bunx playwright install --with-deps chromium
      - run: bun run --filter '@mino/db' db:migrate
        env:
          SUPABASE_DATABASE_URL: ${{ secrets.TEST_SUPABASE_DATABASE_URL }}
      - run: bun run --filter '@mino/web-client' test:e2e
        env:
          NODE_ENV: test
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          
          # Supabase (e2e)
          TEST_SUPABASE_DATABASE_URL: ${{ secrets.TEST_SUPABASE_DATABASE_URL }}
          TEST_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_TEST_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_TEST_SUPABASE_URL }}
          NEXT_PUBLIC_TEST_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_TEST_SUPABASE_PUBLISHABLE_KEY }}
          TEST_CSB_API_KEY: ${{ secrets.TEST_CSB_API_KEY }}
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            apps/web/client/playwright-report
            apps/web/client/test-results
